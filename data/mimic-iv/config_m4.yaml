# general
hyperparameter:
  GPU_ID: 0
  EPOCH: 40
  LR: 0.0002
  Neg_Loss: false
  DDI_IN_MEM: false
  TARGET_DDI: 0.05
  T: 0.5
  decay_weight: 0.85
  model_name: GAMENet
  emb_dim: 64
  sigma: 1.0

# dataset
dataset:
  mimic-iv-ATC3:
    data_path: ./data/mimic-iv/outputATC3/records_final_4.pkl
    voc_path: ./data/mimic-iv/outputATC3/voc_final_4.pkl
    ehr_adj_path: ./data/mimic-iv/outputATC3/ehr_adj_final_4.pkl
    ddi_adj_path: ./data/mimic-iv/outputATC3/ddi_A_final_4.pkl
  mimic-iv-ATC4:
    data_path: ./data/mimic-iv/outputATC4/ATC4_records_final_4.pkl
    voc_path:  ./data/mimic-iv/outputATC4/ATC4_voc_final_4.pkl
    ehr_adj_path: ./data/mimic-iv/outputATC4/ATC4_ehr_adj_final_4.pkl
    ddi_adj_path: ./data/mimic-iv/outputATC4/ATC4_ddi_A_final_4.pkl

# Test
test:
  mimic-iii:
    cosine: ./result/mimic-iii/cosine/best.model
    gaussian: ./result/mimic-iii/gaussian/best.model
    dot: ./result/mimic-iii/dot/best.model
  mimic-iv:
    cosine: ./result/mimic-iv/cosine/best.model
    gaussian: ./result/mimic-iv/gaussian/best.model
    dot: ./result/mimic-iv/dot/best.model
